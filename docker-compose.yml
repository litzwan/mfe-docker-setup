x-build: &common-build
    dockerfile: ../Dockerfile

services:
    root-front:
        build:
            context: ./root-front
            args:
                - VITE_BASE_URL=${VITE_BASE_URL}
                - VITE_APP_ENV=${VITE_APP_ENV}
                - VITE_INTERNAL_ORIGIN_URL=${VITE_INTERNAL_ORIGIN_URL}
                - VITE_KEY_CLOACK_URL=${VITE_KEY_CLOACK_URL}
            <<: *common-build
        container_name: root-front
        ports:
            - 5000:80
        depends_on:
            first-service:
                condition: service_healthy
            second-service:
                condition: service_healthy
        networks:
            - app-network
        volumes:
            - ./nginxConfigs/nginx.root.conf:/etc/nginx/conf.d/default.conf
    first-service:
        build:
            context: ./path/to/first-service/dir
            args:
                - VITE_BASE_URL=${VITE_BASE_URL}
                - VITE_APP_ENV=${VITE_APP_ENV}
                - VITE_INTERNAL_ORIGIN_URL=${VITE_INTERNAL_ORIGIN_URL}
                - VITE_KEY_CLOACK_URL=${VITE_KEY_CLOACK_URL}
            <<: *common-build
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s
        container_name: first-service
        ports:
            - 3002:80
        networks:
            - app-network
        volumes:
            - ./nginxConfigs/nginx.service.conf:/etc/nginx/conf.d/default.conf
    second-service:
        build:
            context: ./path/to/second-service/dir
            args:
                - VITE_BASE_URL=${VITE_BASE_URL}
                - VITE_APP_ENV=${VITE_APP_ENV}
                - VITE_INTERNAL_ORIGIN_URL=${VITE_INTERNAL_ORIGIN_URL}
                - VITE_KEY_CLOACK_URL=${VITE_KEY_CLOACK_URL}
            <<: *common-build
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s
        container_name: second-service
        ports:
            - 3001:80
        networks:
            - app-network
        volumes:
            - ./nginxConfigs/nginx.service.conf:/etc/nginx/conf.d/default.conf
networks:
    app-network:
        driver: bridge
